<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>X-Gem AI| Warptask</title>
    <link rel="stylesheet" href="root.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="shortcut icon" href="imgs/X-Gem_icon.png" />
    <link rel="manifest" href="/manifest.json" />
  </head>
  <style>
    * {
      margin: 0;
      padding: 0;
      text-decoration: none;
      box-sizing: border-box;
      list-style: none;
    }

    html,
    body {
      background: #000;
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
      touch-action: pan-y pinch-zoom;
      touch-action: manipulation;
    }

    .container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 90vh;
      font-family: Inter, sans-serif;
    }

    .header {
      position: fixed;
      top: 20px;
      font-size: 24px;
      left: 20px;
      font-weight: 600;
      width: fit-content;
    }

    .header a {
      color: var(--blue);
      text-decoration: none;
      list-style: none;
      transition: 0.3s;
      font-size: 18px;
    }

    .header a:hover,
    :focus {
      border-bottom: 2px solid var(--blue);
    }

    .max {
      width: 86px;
      align-items: center;

      animation: iosSpin 14s cubic-bezier(0.22, 1, 0.36, 1) infinite;
    }

    @keyframes iosSpin {
      /* 0° da 10s turadi */
      0% {
        transform: rotate(0deg);
      }
      71% {
        transform: rotate(0deg);
      }

      /* 55° ga chiqadi (smooth) */
      80% {
        transform: rotate(-53deg);
      }

      /* 55° da 2s turadi */
      94% {
        transform: rotate(-53deg);
      }

      /* 0° ga ham smooth qaytadi */
      100% {
        transform: rotate(0deg);
      }
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      color: var(--white);
      font-weight: 600;
      letter-spacing: -0.5px;
      opacity: 0;
      transform: translateY(10px);
      margin-top: 12px;
      font-size: 28px;
      animation: fadeUp 1s ease forwards;
    }

    p {
      color: var(--gray);
      animation: fadeUp 2s ease forwards;
      transform: translateY(10px);
      margin-top: 5.5px;
      opacity: 0;
      font-size: 12px;
    }

    .btn {
      width: fit-content;
      padding: 6px 12px;
      background: var(--blue);
      color: var(--white);
      border: none;
      border-radius: 20px;
      position: absolute;
      box-shadow: var(--element-shadow);
      bottom: 23px;
      display: flex;
      gap: 5px;
      align-items: center;
      font-weight: 500;
      font-size: 16px;
    }

    .btn a {
      color: var(--ios-white);
      text-decoration: none;
      font-size: 16px;
    }

    .icon {
      width: 27px;
      animation: iosSpin 14s cubic-bezier(0.22, 1, 0.36, 1) infinite;
    }

    .element {
      zoom: normal; /* Oddiy holat (1.0 yoki 100%) */
      zoom: 1.5; /* 150% ga kattalashtirish */
      zoom: 200%; /* 200% ga kattalashtirish */
      zoom: reset; /* Masshtabni qayta tiklash */
    }

    @scope (.card) {
      /* Faqat .card ichidagi elementlarga ta'sir qiladi */
      img {
        border-radius: 8px;
      }

      :scope {
        /* .card o'ziga stillar */
        background: white;
      }
    }

    @scope (.article) to (figure) {
      /* .article ichidagi, lekin figure dan tashqari elementlar */
      p {
        font-size: 1.1rem;
      }
    }
  </style>
  <body>
    <div class="container">
      <div class="header">
        <a href="index.html"
          ><i class="fa-solid fa-angle-left"></i><span>Home</span></a
        >
      </div>
      <img src="imgs/XGEMicon-removebg-preview.png" alt="" class="max" />
      <h1>X-Gem AI</h1>
      <p>Comming Soon...</p>

      <button class="btn">
        <img src="imgs/xgem_icon.png" class="icon" /><a
          href="https://xgem.netlify.app/"
          >Try Beta</a
        >
      </button>
    </div>
  </body>
  <script>
    let deferredPrompt;

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.querySelector("#installBtn").style.display = "block";
    });

    document
      .querySelector("#installBtn")
      .addEventListener("click", async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          console.log("Install outcome: ", outcome);
          deferredPrompt = null;
        }
      });
  </script>
</html>
