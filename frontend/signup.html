<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | WarpTask</title>
    <link rel="stylesheet" href="root.css">
        <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    
    <style>
        /* CSS STYLES - TO'LIQ SAQLANADI */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Inter", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }



        body {
            background: var(--background);
            color: var(--white);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            width: 100%;
            padding: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 50px;
            color: var(--green);
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .header p {
            color: var(--gray);
            font-size: 16px;
        }

        /* Signup Form */
        .signup-form {
            background: rgba(28, 28, 30, 0.7);
            backdrop-filter: blur(7px);
            -webkit-backdrop-filter: blur(7px);
            border: 0.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--gray);
        }

        .input-container {
            position: relative;
        }

        .input-field {
            width: 100%;
            padding: 16px 50px 16px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            color: var(--white);
            font-size: 16px;
            transition: var(--transition);
        }

        .input-field:focus {
            outline: none;
            border-color: var(--blue);
            background: rgba(255, 255, 255, 0.08);
        }

        .input-field::placeholder {
            color: var(--light-gray);
        }

        .input-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
            font-size: 18px;
            cursor: pointer;
            transition: var(--transition);
        }

        .input-icon:hover {
            color: var(--white);
        }

        /* Validation Messages */
        .validation-message {
            font-size: 13px;
            margin-top: 6px;
            padding-left: 5px;
            display: none;
        }

        .validation-message.valid {
            color: var(--green);
            display: block;
        }

        .validation-message.invalid {
            color: var(--red);
            display: block;
        }

        .validation-icon {
            margin-right: 5px;
        }

        /* Signup Button */
        .signup-button {
            width: 100%;
            padding: 18px;
            background: var(--green);
            color: var(--white);
            border: none;
            border-radius: 22px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .signup-button:hover:not(:disabled) {
            background: var(--green);
            transform: translateY(-2px);
        }

        .signup-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .signup-button:active:not(:disabled) {
            transform: translateY(0);
        }

        /* Error Message */
        .error-message {
            background: rgba(220, 39, 29, 0.1);
            border: 1px solid rgba(220, 39, 29, 0.3);
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 20px;
            color: var(--red);
            font-size: 14px;
            display: none;
            animation: slideDown 0.3s ease;
        }

        .error-message.show {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Login Link */
        .login-link {
            text-align: center;
            color: var(--gray);
            font-size: 15px;
            margin-top: 7px;
            padding: 20px;
        }

        .login-link a {
            color: var(--blue);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .login-link a:hover {
            color: var(--blue);
            text-decoration: underline;
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--white);
            animation: spin 1s ease-in-out infinite;
        }

        .signup-button.loading .spinner {
            display: block;
        }

        .signup-button.loading .button-text {
            display: none;
        }

        /* Back Button */
        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 44px;
            height: 44px;
            background: rgba(28, 28, 30, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: 20px;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            z-index: 1000;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }

        /* Password Requirements */
        .requirements {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 18px;
            padding: 15px;
            margin-top: 20px;
            font-size: 13px;
            color: var(--gray);
        }

        .requirements h4 {
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--light-gray);
        }

        .requirements ul {
            list-style: none;
            padding-left: 5px;
        }

        .requirements li {
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .requirements i {
            font-size: 12px;
        }

        .requirements li.valid {
            color: var(--green);
        }

        .requirements li.invalid {
            color: var(--red);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 10px;
            }

            .header h1 {
                font-size: 28px;
            }

            .signup-form {
                padding: 20px;
            }
        }

        /* Animations */
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .shake {
            animation: shake 0.5s ease;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-button">
        <i class="fas fa-arrow-left"></i>
    </a>

    <div class="container">
        <div class="header">
            <div class="logo">
                <i class="fas fa-user-plus"></i>
            </div>
            <h1>Create Account</h1>
            <p>Join WarpTask to boost your productivity</p>
        </div>

        <div class="error-message" id="errorMessage">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText"></span>
        </div>

        <div class="signup-form">
            <div class="form-group">
                <label class="input-label">Username</label>
                <div class="input-container">
                    <input
                        type="text"
                        id="username"
                        class="input-field"
                        placeholder="Choose a username"
                        autocomplete="username"
                    />
                    <div class="input-icon">
                        <i class="fas fa-at"></i>
                    </div>
                </div>
                <div class="validation-message" id="usernameValidation"></div>
            </div>

            <div class="form-group">
                <label class="input-label">Email</label>
                <div class="input-container">
                    <input
                        type="email"
                        id="email"
                        class="input-field"
                        placeholder="Enter your email"
                        autocomplete="email"
                    />
                    <div class="input-icon">
                        <i class="fas fa-envelope"></i>
                    </div>
                </div>
                <div class="validation-message" id="emailValidation"></div>
            </div>

            <div class="form-group">
                <label class="input-label">Password</label>
                <div class="input-container">
                    <input
                        type="password"
                        id="password"
                        class="input-field"
                        placeholder="Create a password"
                        autocomplete="new-password"
                    />
                    <div class="input-icon" id="togglePassword">
                        <i class="fas fa-eye"></i>
                    </div>
                </div>
                <div class="validation-message" id="passwordValidation"></div>
            </div>

            <div class="form-group">
                <label class="input-label">Confirm Password</label>
                <div class="input-container">
                    <input
                        type="password"
                        id="confirmPassword"
                        class="input-field"
                        placeholder="Confirm your password"
                        autocomplete="new-password"
                    />
                    <div class="input-icon" id="toggleConfirmPassword">
                        <i class="fas fa-eye"></i>
                    </div>
                </div>
                <div class="validation-message" id="confirmPasswordValidation"></div>
            </div>

            <div class="requirements">
                <h4>Password Requirements:</h4>
                <ul>
                    <li id="reqLength">
                        <i class="fas fa-circle"></i>
                        <span>At least 8 characters</span>
                    </li>
                    <li id="reqLetter">
                        <i class="fas fa-circle"></i>
                        <span>At least one letter</span>
                    </li>
                    <li id="reqNumber">
                        <i class="fas fa-circle"></i>
                        <span>At least one number</span>
                    </li>
                </ul>
            </div>

            <button id="signupButton" class="signup-button" disabled>
                <span class="button-text">Create Account</span>
                <div class="spinner"></div>
            </button>
        </div>

        <div class="login-link">
            Already have an account? <a href="login.html">Log in</a>
        </div>
    </div>

    <!-- auth.js ni birinchi yuklash -->
    <script src="js/auth.js"></script>
    
    <script>
        // 1. AVVAL: auth.js yuklangandan keyin ishga tushirish
        function waitForAuth() {
            if (typeof auth !== 'undefined') {
                console.log("✅ auth.js yuklandi!");
                initializeApp();
            } else {
                console.log("⏳ auth.js yuklanmoqda...");
                setTimeout(waitForAuth, 100);
            }
        }

        // 2. ASOSIY DASTURNI ISHGA TUSHIRISH
        function initializeApp() {
            console.log("🚀 Dastur ishga tushmoqda...");
            
            // DOM Elementlari
            const usernameInput = document.getElementById("username");
            const emailInput = document.getElementById("email");
            const passwordInput = document.getElementById("password");
            const confirmPasswordInput = document.getElementById("confirmPassword");
            const signupButton = document.getElementById("signupButton");
            const togglePassword = document.getElementById("togglePassword");
            const toggleConfirmPassword = document.getElementById("toggleConfirmPassword");
            const errorMessage = document.getElementById("errorMessage");
            const errorText = document.getElementById("errorText");

            // Validation elementlari
            const usernameValidation = document.getElementById("usernameValidation");
            const emailValidation = document.getElementById("emailValidation");
            const passwordValidation = document.getElementById("passwordValidation");
            const confirmPasswordValidation = document.getElementById("confirmPasswordValidation");

            // Password requirement elementlari
            const reqLength = document.getElementById("reqLength");
            const reqLetter = document.getElementById("reqLetter");
            const reqNumber = document.getElementById("reqNumber");

            // ========== FUNKSIYALAR ==========

            // 1. Password'ni ko'rsatish/yashirish
            function setupPasswordToggles() {
                togglePassword.addEventListener("click", function () {
                    const type = passwordInput.type === "password" ? "text" : "password";
                    passwordInput.type = type;
                    this.querySelector("i").className = type === "password" ? "fas fa-eye" : "fas fa-eye-slash";
                });

                toggleConfirmPassword.addEventListener("click", function () {
                    const type = confirmPasswordInput.type === "password" ? "text" : "password";
                    confirmPasswordInput.type = type;
                    this.querySelector("i").className = type === "password" ? "fas fa-eye" : "fas fa-eye-slash";
                });
            }

            // 2. Username validatsiyasi
            function validateUsername() {
                const username = usernameInput.value.trim();
                
                if (!username) {
                    usernameValidation.textContent = "";
                    usernameValidation.className = "validation-message";
                    return false;
                }

                const isValid = auth.validateUsername(username);
                
                if (isValid) {
                    usernameValidation.innerHTML = '<i class="fas fa-check-circle validation-icon"></i> Username available';
                    usernameValidation.className = "validation-message valid";
                    return true;
                } else {
                    usernameValidation.innerHTML = '<i class="fas fa-times-circle validation-icon"></i> 3-20 characters, letters, numbers, underscores only';
                    usernameValidation.className = "validation-message invalid";
                    return false;
                }
            }

            // 3. Email validatsiyasi
            function validateEmail() {
                const email = emailInput.value.trim();
                
                if (!email) {
                    emailValidation.textContent = "";
                    emailValidation.className = "validation-message";
                    return false;
                }

                const isValid = auth.validateEmail(email);
                
                if (isValid) {
                    emailValidation.innerHTML = '<i class="fas fa-check-circle validation-icon"></i> Valid email format';
                    emailValidation.className = "validation-message valid";
                    return true;
                } else {
                    emailValidation.innerHTML = '<i class="fas fa-times-circle validation-icon"></i> Please enter a valid email address';
                    emailValidation.className = "validation-message invalid";
                    return false;
                }
            }

            // 4. Password validatsiyasi
            function validatePassword() {
                const password = passwordInput.value;
                
                if (!password) {
                    passwordValidation.textContent = "";
                    passwordValidation.className = "validation-message";
                    updatePasswordRequirements(false, false, false);
                    return false;
                }

                const hasLength = password.length >= 8;
                const hasLetter = /[A-Za-z]/.test(password);
                const hasNumber = /\d/.test(password);
                const isValid = hasLength && hasLetter && hasNumber;

                // Password requirement'larni yangilash
                updatePasswordRequirements(hasLength, hasLetter, hasNumber);

                if (isValid) {
                    passwordValidation.innerHTML = '<i class="fas fa-check-circle validation-icon"></i> Strong password';
                    passwordValidation.className = "validation-message valid";
                    return true;
                } else {
                    passwordValidation.innerHTML = '<i class="fas fa-times-circle validation-icon"></i> Password does not meet requirements';
                    passwordValidation.className = "validation-message invalid";
                    return false;
                }
            }

            // 5. Confirm password validatsiyasi
            function validateConfirmPassword() {
                const confirm = confirmPasswordInput.value;
                const password = passwordInput.value;
                
                if (!confirm) {
                    confirmPasswordValidation.textContent = "";
                    confirmPasswordValidation.className = "validation-message";
                    return false;
                }

                if (confirm === password) {
                    confirmPasswordValidation.innerHTML = '<i class="fas fa-check-circle validation-icon"></i> Passwords match';
                    confirmPasswordValidation.className = "validation-message valid";
                    return true;
                } else {
                    confirmPasswordValidation.innerHTML = '<i class="fas fa-times-circle validation-icon"></i> Passwords do not match';
                    confirmPasswordValidation.className = "validation-message invalid";
                    return false;
                }
            }

            // 6. Password requirement'larni yangilash
            function updatePasswordRequirements(hasLength, hasLetter, hasNumber) {
                updateRequirement(reqLength, hasLength, "At least 8 characters");
                updateRequirement(reqLetter, hasLetter, "At least one letter");
                updateRequirement(reqNumber, hasNumber, "At least one number");
            }

            function updateRequirement(element, isValid, text) {
                const icon = element.querySelector("i");
                const span = element.querySelector("span");

                span.textContent = text;
                
                if (isValid) {
                    element.className = "valid";
                    icon.style.color = "var(--ios-green)";
                    icon.className = "fas fa-check-circle";
                } else {
                    element.className = "invalid";
                    icon.style.color = "var(--ios-red)";
                    icon.className = "fas fa-times-circle";
                }
            }

            // 7. Barcha input'larni tekshirish
            function validateAllInputs() {
                const isUsernameValid = validateUsername();
                const isEmailValid = validateEmail();
                const isPasswordValid = validatePassword();
                const isConfirmValid = validateConfirmPassword();

                // Signup button'ni yoqish/o'chirish
                signupButton.disabled = !(isUsernameValid && isEmailValid && isPasswordValid && isConfirmValid);
            }

            // 8. Xatolikni ko'rsatish
            function showError(message) {
                errorText.textContent = message;
                errorMessage.classList.add("show");
                signupButton.classList.remove("shake");
                
                setTimeout(() => {
                    signupButton.classList.add("shake");
                }, 10);
            }

            // 9. Xatolikni yashirish
            function hideError() {
                errorMessage.classList.remove("show");
                signupButton.classList.remove("shake");
            }

            // 10. SIGNUP FUNKSIYASI (ASOSIY)
            async function handleSignup() {
                const username = usernameInput.value.trim();
                const email = emailInput.value.trim();
                const password = passwordInput.value;
                const confirmPassword = confirmPasswordInput.value;

                // Yakuniy validatsiya
                if (password !== confirmPassword) {
                    showError("Passwords do not match");
                    return;
                }

                if (!auth.validatePassword(password)) {
                    showError("Password does not meet requirements");
                    return;
                }

                // Loading holati
                signupButton.disabled = true;
                signupButton.classList.add("loading");
                hideError();

                try {
                    console.log("📝 Signup boshlandi...");
                    const user = await auth.signup(username, email, password);
                    
                    console.log("✅ Signup muvaffaqiyatli:", user.username);
                    
                    // Muvaffaqiyat holati
                    signupButton.innerHTML = '<i class="fas fa-check"></i> Account Created!';
                    
                    // Index sahifasiga o'tish
                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 1000);
                    
                } catch (error) {
                    console.error("❌ Signup xatosi:", error);
                    
                    // Xatolikni ko'rsatish
                    showError(error.message || "Signup failed. Please try again.");
                    
                    // Button'ni tiklash
                    signupButton.disabled = false;
                    signupButton.classList.remove("loading");
                    signupButton.querySelector(".button-text").textContent = "Create Account";
                }
            }

            // ========== EVENT LISTENER'LAR ==========

            // Input'larni kuzatish
            usernameInput.addEventListener("input", validateAllInputs);
            emailInput.addEventListener("input", validateAllInputs);
            passwordInput.addEventListener("input", validateAllInputs);
            confirmPasswordInput.addEventListener("input", validateAllInputs);

            // Enter tugmasi bilan signup
            document.addEventListener("keypress", function (e) {
                if (e.key === "Enter" && !signupButton.disabled && !signupButton.classList.contains("loading")) {
                    handleSignup();
                }
            });

            // Signup button bosilganda
            signupButton.addEventListener("click", handleSignup);

            // Password toggles'ni sozlash
            setupPasswordToggles();

            // Dastlabki validatsiya
            validateAllInputs();

            // Auth holatini tekshirish
            checkAuthState();
        }

        // 3. AUTH HOLATINI TEKSHIRISH
        function checkAuthState() {
            console.log("🔍 Auth holati tekshirilmoqda...");
            
            if (auth && auth.isLoggedIn()) {
                console.log("⚠️ Foydalanuvchi allaqachon tizimga kirgan!");
                
                // Agar allaqachon kiringan bo'lsa, signup sahifasida qolishga ruxsat beramiz
                // Chunki yangi hisob ochmoqchi bo'lishi mumkin
                // Faqatgina ogohlantirish beramiz
                
                // Istasangiz, index.html ga yo'naltirish:
                // setTimeout(() => {
                //     window.location.href = "index.html";
                // }, 100);
            } else {
                console.log("👤 Foydalanuvchi tizimga kirmagan");
            }
        }

        // 4. SAHIFA YUKLANISHI
        document.addEventListener("DOMContentLoaded", function() {
            console.log("📄 DOM yuklandi, auth.js kutilyapti...");
            waitForAuth();
        });

        // 5. XATOLIKLARNI USHLASH
        window.addEventListener("error", function(e) {
            console.error("🌐 Global xatolik:", e.error);
        });
    </script>
</body>
</html>
