<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Page Not Found | WarpTask</title>
    <link rel="manifest" href="/manifest.json">

    <link rel="shortcut icon" href="./imgs/warptaskbetaimg.png" />
   <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="root.css" />
    <link rel="stylesheet" href="bottom_nav.css">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
        -webkit-tap-highlight-color: transparent;
        transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      }

      body {
        background: #000000; /* Qora fon */
        color: #ffffff;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
        overflow-x: hidden;
      }

      .container {
        max-width: 400px;
        margin: 0 auto;
        padding: 20px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        position: relative;
      }

      /* Error Content */
      .error-content {
        text-align: center;
        width: 100%;
      }

      /* Error Number */
      .error-number {
        font-size: 120px;
        font-weight: 900;
        color: #007AFF; /* Aniq iOS blue */
        line-height: 1;
        margin-bottom: -120px;
        position: relative;
        text-shadow: 0 4px 20px rgba(0, 122, 255, 0.3);
      }

      /* Error Icon */
      .error-icon {
        font-size: 80px;
        color: #FF3B30; /* Aniq iOS red */
        margin-bottom: 30px;
        animation: float 3s ease-in-out infinite;
      }

      /* Error Title */
      .error-title {
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 15px;
        color: white;
      }

      /* Error Message */
      .error-message {
        color: #8E8E93; /* Aniq iOS gray */
        font-size: 17px;
        margin-bottom: 40px;
        max-width: 320px;
        margin-left: auto;
        margin-right: auto;
        line-height: 1.5;
      }

      /* Search Box */
      .search-box {
        background: rgba(28, 28, 30, 0.9); /* iOS dark card */
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 0.5px solid rgba(255, 255, 255, 0.15);
        border-radius: 20px;
        padding: 15px;
        margin-bottom: 30px;
        width: 100%;
        max-width: 320px;
        display: flex;
        align-items: center;
        gap: 10px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }

      .search-input {
        flex: 1;
        border: none;
        outline: none;
        background: transparent;
        color: white;
        font-size: 16px;
      }

      .search-input::placeholder {
        color: #8E8E93;
      }

      .search-button {
        background: #007AFF;
        border: none;
        border-radius: 12px;
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .search-button:hover {
        background: #0056CC;
        transform: scale(1.05);
      }

      /* Quick Links */
      .quick-links {
        margin-bottom: 40px;
      }

      .links-title {
        font-size: 16px;
        color: #8E8E93;
        margin-bottom: 15px;
        font-weight: 500;
      }

      .links-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .link-item {
        background: rgba(28, 28, 30, 0.9);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 0.5px solid rgba(255, 255, 255, 0.15);
        border-radius: 15px;
        padding: 15px;
        text-align: center;
        text-decoration: none;
        color: white;
        transition: all 0.3s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      }

      .link-item:hover {
        background: rgba(0, 122, 255, 0.2);
        transform: translateY(-2px);
        border-color: #007AFF;
        box-shadow: 0 8px 25px rgba(0, 122, 255, 0.3);
      }

      .link-icon {
        font-size: 20px;
        color: #007AFF;
      }

      .link-text {
        font-size: 14px;
        font-weight: 500;
      }

      /* Action Buttons */
      .action-buttons {
        display: flex;
        gap: 15px;
        margin-bottom: 40px;
        width: 100%;
        max-width: 320px;
      }

      .action-button {
        flex: 1;
        padding: 16px;
        border-radius: 15px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: none;
      }

      .primary-button {
        background: #007AFF;
        color: white;
      }

      .primary-button:hover {
        background: #0056CC;
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(0, 122, 255, 0.3);
      }

      .secondary-button {
        background: transparent;
        color: #8E8E93;
        border: 1px solid #8E8E93;
      }

      .secondary-button:hover {
        background: rgba(255, 255, 255, 0.05);
        color: white;
        transform: translateY(-2px);
        border-color: white;
      }

   
      /* Animations */
      @keyframes float {
        0%, 100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-20px);
        }
      }

      @keyframes pulse {
        0%, 100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Apply animations */
      .error-icon {
        animation: float 3s ease-in-out infinite;
      }

      .error-number {
        animation: pulse 2s ease-in-out infinite;
      }

      .error-content > * {
        animation: slideIn 0.6s ease-out;
      }

      /* Particle Background */
      .particles {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        pointer-events: none;
      }

      .particle {
        position: absolute;
        border-radius: 50%;
        background: #007AFF;
        opacity: 0.1;
      }

      /* Responsive */
      @media (max-width: 480px) {
        .container {
          padding: 15px;
        }
        
        .error-number {
          font-size: 100px;
        }
        
        .error-icon {
          font-size: 60px;
        }
        
        .error-title {
          font-size: 24px;
        }
        
        .error-message {
          font-size: 16px;
        }
        
        .action-buttons {
          flex-direction: column;
        }
        
        .links-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <!-- Particle Background -->
    <div class="particles" id="particles"></div>

    <div class="container">
      <!-- Error Content -->
      <div class="error-content">
        <div class="error-number">404</div>
        
        <div class="error-icon">
          <i class="fas fa-map-marker-slash"></i>
        </div>
        
        <h1 class="error-title">Page Not Found</h1>
        
        <p class="error-message">
          Oops! The page you're looking for seems to have warped into another dimension.
          Don't worry, let's get you back on track.
        </p>

        <!-- Search Box -->
        <div class="search-box">
          <input 
            type="text" 
            class="search-input" 
            placeholder="Search for pages..."
            id="searchInput"
          />
          <button class="search-button" onclick="searchPage()">
            <i class="fas fa-search"></i>
          </button>
        </div>

        <!-- Quick Links -->
        <div class="quick-links">
          <div class="links-title">Quick Links</div>
          <div class="links-grid">
            <a href="index.html" class="link-item">
              <i class="fa-solid fa-house-circle-check link-icon"></i>
              <span class="link-text">Home</span>
            </a>
            <a href="calendar.html" class="link-item">
              <i class="fas fa-calendar link-icon"></i>
              <span class="link-text">Calendar</span>
            </a>
            <a href="add.html" class="link-item">
              <i class="fas fa-plus link-icon"></i>
              <span class="link-text">Add Task</span>
            </a>
            <a href="stats.html" class="link-item">
              <i class="fas fa-chart-pie link-icon"></i>
              <span class="link-text">Statistics</span>
            </a>
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
          <button class="action-button primary-button" onclick="goHome()">
            <i class="fas fa-home"></i>
            Go Home
          </button>
          <button class="action-button secondary-button" onclick="goBack()">
            <i class="fas fa-arrow-left"></i>
            Go Back
          </button>
        </div>
      </div>

      <!-- Bottom Navigation -->
      <div class="nav">
        
        <div class="bottom-nav">
          <a href="index.html" class="nav-item active" data-link>
            <i class="fa-solid fa-house-circle-check" id="nav-icon"></i>
          </a>
          <a href="calendar.html" class="nav-item" data-link>
            <i class="fa-solid fa-calendar" id="nav-icon"></i>
          </a>
          <a href="add.html" class="nav-item" data-link>
            <i class="fa-solid fa-plus" id="nav-icon"></i>
          </a>

          <a href="stats.html" class="nav-item" id="nav-icon" data-link>
            <i class="fa-solid fa-chart-pie"></i>
          </a>
          <a href="settings.html" class="nav-item" id="nav-icon" data-link>
            <i class="fa-solid fa-bars"></i>
          </a>
        </div>
        <div class="chat">
          <a href="chat.html" style="color: #fff">
            <i class="fa-solid fa-comment" id="nav-icon"></i>
          </a>
        </div>
      </div>
    </div>

    <script>
      // Create particle background
      function createParticles() {
        const particlesContainer = document.getElementById('particles');
        const particleCount = 15;
        
        for (let i = 0; i < particleCount; i++) {
          const particle = document.createElement('div');
          particle.classList.add('particle');
          
          // Random properties
          const size = Math.random() * 4 + 1;
          const posX = Math.random() * 100;
          const posY = Math.random() * 100;
          const duration = Math.random() * 20 + 10;
          const delay = Math.random() * 5;
          const color = Math.random() > 0.5 ? '#007AFF' : '#5856D6';
          
          particle.style.cssText = `
            width: ${size}px;
            height: ${size}px;
            left: ${posX}%;
            top: ${posY}%;
            background: ${color};
            animation: float ${duration}s ease-in-out ${delay}s infinite;
          `;
          
          particlesContainer.appendChild(particle);
        }
      }

      // Navigation functions
      function goHome() {
        window.location.href = 'index.html';
      }

      function goBack() {
        if (window.history.length > 1) {
          window.history.back();
        } else {
          goHome();
        }
      }

      function searchPage() {
        const searchTerm = document.getElementById('searchInput').value.trim();
        
        if (!searchTerm) {
          // Pulse animation for empty search
          const input = document.getElementById('searchInput');
          input.style.animation = 'pulse 0.5s ease-in-out';
          setTimeout(() => {
            input.style.animation = '';
          }, 500);
          return;
        }
        
        // In a real app, this would search your pages
        // For demo, just show a message and redirect to home if search is "home"
        if (searchTerm.toLowerCase() === 'home') {
          goHome();
        } else {
          alert(`Searching for: "${searchTerm}"\n\nIn a full application, this would search through available pages.`);
        }
      }

      // Keyboard shortcuts
      document.addEventListener('keydown', (e) => {
        // Ctrl/Cmd + K for search
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
          e.preventDefault();
          document.getElementById('searchInput').focus();
        }
        
        // Escape to blur search
        if (e.key === 'Escape') {
          document.getElementById('searchInput').blur();
        }
        
        // Enter to search
        if (e.key === 'Enter' && document.activeElement.id === 'searchInput') {
          searchPage();
        }
      });

      // Auto-focus search on page load
      document.addEventListener('DOMContentLoaded', () => {
        createParticles();
        
        // Check if user is logged in
        const currentUser = JSON.parse(localStorage.getItem('wzCurrentUser'));
        if (!currentUser || !currentUser.loggedIn) {
          // If not logged in, show login suggestion
          setTimeout(() => {
            if (confirm('It seems you are not logged in. Would you like to sign in?')) {
              window.location.href = 'login.html';
            }
          }, 2000);
        }
      });

      // Add CSS for particle animation
      const style = document.createElement('style');
      style.textContent = `
        @keyframes float {
          0%, 100% {
            transform: translate(0, 0) rotate(0deg);
          }
          25% {
            transform: translate(10px, -10px) rotate(90deg);
          }
          50% {
            transform: translate(0, -20px) rotate(180deg);
          }
          75% {
            transform: translate(-10px, -10px) rotate(270deg);
          }
        }
      `;
      document.head.appendChild(style);

      // Offline support
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then(reg => console.log('Service Worker registered:', reg.scope))
            .catch(err => console.log('Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
